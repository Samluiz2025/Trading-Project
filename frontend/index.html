<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIP v2 – Trading Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #050810;
    --bg1: #0b0f1e;
    --bg2: #111829;
    --bg3: #192035;
    --accent-green:  #00e5a0;
    --accent-red:    #ff4466;
    --accent-blue:   #3d9fff;
    --accent-yellow: #f5c842;
    --accent-purple: #a67cff;
    --text-primary:  #e8edf8;
    --text-secondary:#8a9ab8;
    --text-muted:    #4a5878;
    --border:        rgba(61,159,255,0.12);
    --glow-green:    0 0 20px rgba(0,229,160,0.25);
    --glow-red:      0 0 20px rgba(255,68,102,0.25);
    --glow-blue:     0 0 20px rgba(61,159,255,0.2);
    --font-mono: 'Space Mono', monospace;
    --font-ui:   'Outfit', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    background: var(--bg0);
    color: var(--text-primary);
    font-family: var(--font-ui);
    overflow-x: hidden;
  }

  /* Grid noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(61,159,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,159,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .shell {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 220px 1fr 300px;
    grid-template-areas:
      "header header header"
      "sidebar main panel";
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    grid-area: header;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    gap: 16px;
  }
  .logo {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-blue);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .logo span { color: var(--accent-green); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    justify-content: center;
  }
  .header-controls select, .header-controls input {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .header-controls select:focus, .header-controls input:focus {
    border-color: var(--accent-blue);
  }

  .btn {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent-blue);
    color: #000;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-ghost:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 6px var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ── Sidebar ── */
  .sidebar {
    grid-area: sidebar;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-title {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 16px 4px;
  }
  .pair-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    gap: 8px;
  }
  .pair-item:hover { background: var(--bg2); border-left-color: var(--accent-blue); }
  .pair-item.active {
    background: var(--bg3);
    border-left-color: var(--accent-green);
  }
  .pair-name {
    font-weight: 600;
    font-size: 14px;
    font-family: var(--font-mono);
  }
  .pair-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .pair-bias {
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .bias-buy  { color: var(--accent-green); }
  .bias-sell { color: var(--accent-red); }
  .bias-neutral { color: var(--text-muted); }
  .score-bar {
    width: 60px;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── Main ── */
  main {
    grid-area: main;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .card-body { padding: 16px; }

  /* ── Setup card ── */
  .setup-card {
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .setup-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-blue), transparent);
  }
  .setup-card.sell::before {
    background: linear-gradient(90deg, var(--accent-red), var(--accent-purple), transparent);
  }
  .setup-card.no-trade::before {
    background: var(--text-muted);
  }

  .setup-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .setup-symbol {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .setup-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .badge-buy  { background: rgba(0,229,160,0.12); color: var(--accent-green); border: 1px solid rgba(0,229,160,0.3); }
  .badge-sell { background: rgba(255,68,102,0.12); color: var(--accent-red);   border: 1px solid rgba(255,68,102,0.3); }
  .badge-wait { background: rgba(138,154,184,0.1); color: var(--text-muted);   border: 1px solid rgba(138,154,184,0.2); }

  .setup-levels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .level-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .level-label {
    font-size: 10px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .level-value {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
  }
  .lv-entry { color: var(--accent-blue); }
  .lv-sl    { color: var(--accent-red); }
  .lv-tp    { color: var(--accent-green); }

  /* Quality Meter */
  .quality-meter {
    margin-bottom: 16px;
  }
  .qm-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .qm-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .qm-score {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
  }
  .qm-track {
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .qm-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Confluences */
  .confluences-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .conf-chip {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(0,229,160,0.07);
    border: 1px solid rgba(0,229,160,0.18);
    color: var(--accent-green);
  }
  .conf-chip.missing {
    background: rgba(255,68,102,0.07);
    border-color: rgba(255,68,102,0.18);
    color: var(--accent-red);
  }

  /* ── Chart placeholder ── */
  .chart-container {
    height: 280px;
    background: var(--bg2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .chart-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tv-widget-container { width: 100%; height: 100%; }

  /* ── Confluence Map ── */
  .conf-map {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .conf-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg2);
    border-radius: 6px;
    font-size: 12px;
  }
  .conf-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .conf-ok   { background: rgba(0,229,160,0.15); color: var(--accent-green); }
  .conf-fail { background: rgba(255,68,102,0.15); color: var(--accent-red); }
  .conf-name { color: var(--text-secondary); }
  .conf-val  { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

  /* ── Right panel ── */
  .panel {
    grid-area: panel;
    background: var(--bg1);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 14px;
  }
  .panel-section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* Performance stats */
  .perf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .perf-stat {
    background: var(--bg2);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .perf-stat-val {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }
  .perf-stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Journal entries */
  .journal-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
  }
  .journal-entry:last-child { border-bottom: none; }
  .je-symbol { font-family: var(--font-mono); font-weight: 700; font-size: 12px; }
  .je-outcome { margin-left: auto; font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
  .je-win  { color: var(--accent-green); }
  .je-loss { color: var(--accent-red); }
  .je-open { color: var(--accent-blue); }
  .je-time { color: var(--text-muted); font-size: 10px; }

  /* Alert feed */
  .alert-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .alert-text { color: var(--text-secondary); line-height: 1.4; }
  .alert-time { margin-left: auto; font-size: 10px; color: var(--text-muted); white-space: nowrap; font-family: var(--font-mono); }

  /* Loading */
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* No-trade message */
  .no-trade-msg {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
  }
  .no-trade-msg .icon { font-size: 36px; margin-bottom: 12px; }
  .no-trade-msg h3 { font-size: 15px; color: var(--text-secondary); margin-bottom: 8px; }
  .no-trade-msg .missing-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 12px;
  }
  .missing-chip {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 3px 9px;
    border-radius: 12px;
    background: rgba(255,68,102,0.07);
    border: 1px solid rgba(255,68,102,0.18);
    color: var(--accent-red);
  }

  /* RR display */
  .rr-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-yellow);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 1100px) {
    .shell { grid-template-columns: 180px 1fr; grid-template-areas: "header header" "sidebar main"; }
    .panel { display: none; }
  }
  @media (max-width: 720px) {
    .shell { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; grid-template-areas: "header" "sidebar" "main"; }
    .sidebar { max-height: 160px; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: row; padding: 8px; border-right: none; border-bottom: 1px solid var(--border); }
    .pair-item { min-width: 90px; flex-direction: column; align-items: center; padding: 8px; border-left: none; border-bottom: 3px solid transparent; }
    .pair-item.active { border-bottom-color: var(--accent-green); border-left-color: transparent; }
    .sidebar-title { display: none; }
    .setup-levels { grid-template-columns: repeat(3, 1fr); }
    .conf-map { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="logo">TIP<span>v2</span></div>
    <div class="header-controls">
      <select id="sourceSelect">
        <option value="auto">Auto Source</option>
        <option value="binance">Binance</option>
        <option value="yfinance">Yahoo Finance</option>
        <option value="mock">Mock (offline)</option>
      </select>
      <button class="btn btn-primary" onclick="refreshData()">↻ Refresh</button>
      <button class="btn btn-ghost" onclick="runBacktest()">⬥ Backtest</button>
    </div>
    <div class="header-status">
      <div class="dot"></div>
      <span id="lastUpdate">–</span>
      <span id="dailyCap" style="color:var(--accent-yellow)">0/5 setups</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Watchlist</div>
    <div id="pairList"></div>
  </aside>

  <!-- MAIN -->
  <main id="mainContent">
    <div class="card">
      <div class="card-header">
        <span class="card-title" id="chartTitle">GBPUSD — H1</span>
        <span id="rr-display"></span>
      </div>
      <div class="card-body" style="padding:0">
        <div class="chart-container">
          <div id="tv-widget" class="tv-widget-container"></div>
        </div>
      </div>
    </div>

    <div id="setupCardContainer"></div>

    <div class="card" id="confMapCard">
      <div class="card-header">
        <span class="card-title">Confluence Map</span>
        <span id="confScore" style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">–</span>
      </div>
      <div class="card-body">
        <div class="conf-map" id="confMap"></div>
      </div>
    </div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="panel">
    <div class="panel-section">
      <div class="panel-section-title">Performance</div>
      <div class="perf-grid" id="perfGrid">
        <div class="perf-stat"><div class="perf-stat-val" style="color:var(--text-muted)">–</div><div class="perf-stat-label">Win Rate</div></div>
        <div class="perf-stat"><div class="perf-stat-val" style="color:var(--text-muted)">–</div><div class="perf-stat-label">Trades</div></div>
        <div class="perf-stat"><div class="perf-stat-val" style="color:var(--text-muted)">–</div><div class="perf-stat-label">Profit Factor</div></div>
        <div class="perf-stat"><div class="perf-stat-val" style="color:var(--text-muted)">–</div><div class="perf-stat-label">Streak</div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Recent Journal</div>
      <div id="journalFeed"></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Alert Feed</div>
      <div id="alertFeed"></div>
    </div>
  </aside>

</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let currentSymbol = 'GBPUSD';
let currentSource = 'auto';
let tvWidget = null;
let watchlistData = {};

const PAIRS = ['ETHUSDT','GBPUSD','EURUSD','BTCUSDT','XAUUSD','NAS100','USDCHF','USDJPY'];

const TV_SYMBOL_MAP = {
  'GBPUSD':'FX:GBPUSD','EURUSD':'FX:EURUSD','USDCHF':'FX:USDCHF',
  'USDJPY':'FX:USDJPY','XAUUSD':'OANDA:XAUUSD','NAS100':'NASDAQ:NDX',
  'BTCUSDT':'BINANCE:BTCUSDT','ETHUSDT':'BINANCE:ETHUSDT'
};

// ── Build sidebar ──────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('pairList');
  list.innerHTML = PAIRS.map(p => `
    <div class="pair-item ${p===currentSymbol?'active':''}" onclick="selectPair('${p}')" id="pair-${p}">
      <span class="pair-name">${p}</span>
      <div class="pair-meta">
        <span class="pair-bias bias-neutral" id="bias-${p}">–</span>
        <div class="score-bar"><div class="score-fill" id="score-${p}" style="width:0%;background:var(--text-muted)"></div></div>
      </div>
    </div>`).join('');
}

function updateSidebarItem(symbol, data) {
  const biasEl  = document.getElementById('bias-' + symbol);
  const scoreEl = document.getElementById('score-' + symbol);
  if (!biasEl || !scoreEl) return;
  const bias = (data.bias || data.confluence_detail?.bias || 'NEUTRAL').toUpperCase();
  const score = data.confluence_score || data.quality_score || 0;
  biasEl.textContent = bias;
  biasEl.className = 'pair-bias ' + (bias==='BUY'?'bias-buy':bias==='SELL'?'bias-sell':'bias-neutral');
  const color = score>=72 ? 'var(--accent-green)' : score>=50 ? 'var(--accent-yellow)' : 'var(--accent-red)';
  scoreEl.style.width = score + '%';
  scoreEl.style.background = color;
}

// ── TradingView Widget ─────────────────────────────────────────────────────
function loadChart(symbol) {
  const tvSym = TV_SYMBOL_MAP[symbol] || symbol;
  document.getElementById('tv-widget').innerHTML = '';
  if (typeof TradingView !== 'undefined') {
    new TradingView.widget({
      container_id: 'tv-widget',
      symbol: tvSym,
      interval: '60',
      timezone: 'Etc/UTC',
      theme: 'dark',
      style: '1',
      locale: 'en',
      toolbar_bg: '#0b0f1e',
      enable_publishing: false,
      hide_top_toolbar: false,
      hide_legend: false,
      save_image: false,
      backgroundColor: '#050810',
      gridColor: 'rgba(61,159,255,0.05)',
      width: '100%',
      height: 280,
    });
  }
  document.getElementById('chartTitle').textContent = `${symbol} — H1`;
}

// ── Render setup card ──────────────────────────────────────────────────────
function renderSetupCard(data) {
  const container = document.getElementById('setupCardContainer');
  const rrDisplay = document.getElementById('rr-display');
  const isValid   = data.status === 'VALID';
  const isBuy     = (data.bias || '').toUpperCase() === 'BUY';
  const score     = data.quality_score || 0;

  rrDisplay.innerHTML = isValid
    ? `<span class="rr-badge">1:${data.rr || '?'} RR</span>`
    : '';

  if (!isValid) {
    const missing = data.missing || [];
    container.innerHTML = `
      <div class="setup-card no-trade">
        <div class="no-trade-msg">
          <div class="icon">⊘</div>
          <h3>No Valid Setup</h3>
          <p style="font-size:12px;color:var(--text-muted);max-width:300px;margin:0 auto">${data.message || 'Confluence requirements not met.'}</p>
          ${missing.length ? `<div class="missing-list">${missing.map(m=>`<span class="missing-chip">${m}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;
    return;
  }

  const scoreColor = score>=90 ? '#a67cff' : score>=80 ? '#00e5a0' : '#3d9fff';
  const confs = data.confluences || [];
  const miss  = data.missing || [];

  container.innerHTML = `
    <div class="setup-card ${isBuy?'':'sell'}">
      <div class="setup-header">
        <div>
          <div class="setup-symbol">${data.symbol}</div>
          <div style="color:var(--text-muted);font-size:12px;margin-top:2px;font-family:var(--font-mono)">${data.timestamp?.substring(0,19).replace('T',' ')} UTC</div>
        </div>
        <span class="setup-badge ${isBuy?'badge-buy':'badge-sell'}">${isBuy?'▲ BUY':'▼ SELL'}</span>
      </div>
      <div class="setup-levels">
        <div class="level-box"><div class="level-label">Entry</div><div class="level-value lv-entry">${data.entry}</div></div>
        <div class="level-box"><div class="level-label">Stop Loss</div><div class="level-value lv-sl">${data.sl}</div></div>
        <div class="level-box"><div class="level-label">Take Profit</div><div class="level-value lv-tp">${data.tp}</div></div>
      </div>
      <div class="quality-meter">
        <div class="qm-header">
          <span class="qm-label">Quality Score</span>
          <span class="qm-score" style="color:${scoreColor}">${score}<span style="font-size:12px;color:var(--text-muted)">/100</span></span>
        </div>
        <div class="qm-track"><div class="qm-fill" style="width:${score}%;background:${scoreColor}"></div></div>
      </div>
      <div class="confluences-grid">
        ${confs.map(c=>`<span class="conf-chip">✓ ${c}</span>`).join('')}
        ${miss.map(m=>`<span class="conf-chip missing">✗ ${m}</span>`).join('')}
      </div>
    </div>`;
}

// ── Render confluence map ──────────────────────────────────────────────────
function renderConfMap(data) {
  const map = document.getElementById('confMap');
  const scoreEl = document.getElementById('confScore');
  const score = data.quality_score || data.confluence_score || 0;
  scoreEl.textContent = `${score}/100`;

  const items = [
    {label:'Daily Bias',     ok: data.daily_bias !== 'NEUTRAL',   val: data.daily_bias},
    {label:'H4 Bias',        ok: data.h4_bias !== 'NEUTRAL',      val: data.h4_bias},
    {label:'H1 Structure',   ok: data.h1_structure !== 'RANGING', val: data.h1_structure},
    {label:'Liquidity Sweep',ok: data.has_sweep,    val: data.has_sweep?'YES':'NO'},
    {label:'M15 BOS',        ok: data.has_bos,      val: data.has_bos?'YES':'NO'},
    {label:'Order Block',    ok: data.has_ob,       val: data.has_ob?'FOUND':'NONE'},
    {label:'FVG Present',    ok: data.has_fvg,      val: data.has_fvg?'YES':'NO'},
    {label:'ADX Strength',   ok: (data.adx||0)>=22, val: data.adx?.toFixed(1)},
    {label:'RSI Zone',       ok: true,              val: data.rsi?.toFixed(1)},
    {label:'Session',        ok: data.session!=='Off-session', val: data.session},
  ];

  map.innerHTML = items.map(item => `
    <div class="conf-row">
      <div class="conf-icon ${item.ok?'conf-ok':'conf-fail'}">${item.ok?'✓':'✗'}</div>
      <span class="conf-name">${item.label}</span>
      <span class="conf-val">${item.val||'–'}</span>
    </div>`).join('');
}

// ── Render performance ─────────────────────────────────────────────────────
function renderPerformance(data) {
  const grid = document.getElementById('perfGrid');
  const wr = data.win_rate_pct || 0;
  const wrColor = wr>=70?'var(--accent-green)':wr>=50?'var(--accent-yellow)':'var(--accent-red)';
  grid.innerHTML = `
    <div class="perf-stat"><div class="perf-stat-val" style="color:${wrColor}">${wr}%</div><div class="perf-stat-label">Win Rate</div></div>
    <div class="perf-stat"><div class="perf-stat-val" style="color:var(--accent-blue)">${data.total_trades||0}</div><div class="perf-stat-label">Trades</div></div>
    <div class="perf-stat"><div class="perf-stat-val" style="color:var(--accent-purple)">${data.profit_factor||'–'}</div><div class="perf-stat-label">P. Factor</div></div>
    <div class="perf-stat"><div class="perf-stat-val" style="color:var(--accent-yellow)">${data.current_streak||0}</div><div class="perf-stat-label">Streak</div></div>`;
}

// ── Render journal ─────────────────────────────────────────────────────────
function renderJournal(entries) {
  const feed = document.getElementById('journalFeed');
  if (!entries.length) { feed.innerHTML = '<div style="color:var(--text-muted);font-size:12px">No entries yet.</div>'; return; }
  feed.innerHTML = entries.slice(-8).reverse().map(e => {
    const oc = (e.outcome||'OPEN').toUpperCase();
    const cls = oc==='WIN'?'je-win':oc==='LOSS'?'je-loss':'je-open';
    return `<div class="journal-entry">
      <span class="je-symbol">${e.symbol||e.pair||'?'}</span>
      <span style="color:var(--text-muted);font-size:11px">${(e.bias||'?').toUpperCase()}</span>
      <span class="je-time">${(e.timestamp||e.logged_at||'').substring(5,16)}</span>
      <span class="je-outcome ${cls}">${oc}</span>
    </div>`;
  }).join('');
}

// ── Render alerts ──────────────────────────────────────────────────────────
function renderAlerts(alerts) {
  const feed = document.getElementById('alertFeed');
  if (!alerts.length) { feed.innerHTML = '<div style="color:var(--text-muted);font-size:12px">No alerts yet.</div>'; return; }
  feed.innerHTML = alerts.slice(-6).reverse().map(a => {
    const isBuy = (a.bias||'').toUpperCase()==='BUY';
    const color = isBuy ? 'var(--accent-green)' : 'var(--accent-red)';
    return `<div class="alert-item">
      <div class="alert-dot" style="background:${color}"></div>
      <div class="alert-text"><strong style="color:${color}">${a.pair} ${a.bias}</strong> Entry: ${a.entry}</div>
      <span class="alert-time">${(a.timestamp||'').substring(11,16)}</span>
    </div>`;
  }).join('');
}

// ── Main fetch ─────────────────────────────────────────────────────────────
async function fetchData(symbol) {
  const source = document.getElementById('sourceSelect').value;
  const [analysisRes, confRes] = await Promise.all([
    fetch(`/data?symbol=${symbol}&source=${source}`).then(r=>r.json()),
    fetch(`/confluence?symbol=${symbol}&source=${source}`).then(r=>r.json()),
  ]);
  renderSetupCard(analysisRes);
  renderConfMap(confRes);
  return analysisRes;
}

async function fetchWatchlist() {
  const source = document.getElementById('sourceSelect').value;
  const res = await fetch(`/watchlist?source=${source}`).then(r=>r.json());
  const items = res.watchlist || [];
  items.forEach(item => { if (item.symbol) updateSidebarItem(item.symbol, item); });
  const cap = res.daily_setups_fired || 0;
  document.getElementById('dailyCap').textContent = `${cap}/5 setups`;
  return items;
}

async function fetchPerformance() {
  const res = await fetch('/performance').then(r=>r.json()).catch(()=>({}));
  renderPerformance(res);
}

async function fetchJournal() {
  const res = await fetch('/journal').then(r=>r.json()).catch(()=>({entries:[]}));
  renderJournal(res.entries||[]);
}

async function fetchAlerts() {
  // Try reading from /journal since alerts.json is internal
  const res = await fetch('/journal?limit=20').then(r=>r.json()).catch(()=>({entries:[]}));
  renderAlerts(res.entries||[]);
}

async function selectPair(symbol) {
  currentSymbol = symbol;
  document.querySelectorAll('.pair-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('pair-' + symbol);
  if (el) el.classList.add('active');
  loadChart(symbol);
  document.getElementById('setupCardContainer').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text-muted)">
      <div class="spinner"></div>
      <span class="loading-text">Analyzing ${symbol}...</span>
    </div>`;
  await fetchData(symbol);
}

async function refreshData() {
  await Promise.all([
    fetchData(currentSymbol),
    fetchWatchlist(),
    fetchPerformance(),
    fetchJournal(),
    fetchAlerts(),
  ]);
  document.getElementById('lastUpdate').textContent =
    new Date().toUTCString().substring(17, 25) + ' UTC';
}

async function runBacktest() {
  const source = document.getElementById('sourceSelect').value;
  document.getElementById('setupCardContainer').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text-muted)">
      <div class="spinner"></div>
      <span class="loading-text">Running backtest for ${currentSymbol}...</span>
    </div>`;
  const res = await fetch(`/backtest?symbol=${currentSymbol}&source=${source}&lookback_days=30`)
    .then(r=>r.json()).catch(e=>({error:e.message}));
  if (res.error) {
    document.getElementById('setupCardContainer').innerHTML =
      `<div class="setup-card no-trade"><div class="no-trade-msg"><div class="icon">⚠</div><h3>Backtest Error</h3><p>${res.error}</p></div></div>`;
    return;
  }
  const wrColor = res.win_rate_pct>=70?'var(--accent-green)':res.win_rate_pct>=50?'var(--accent-yellow)':'var(--accent-red)';
  document.getElementById('setupCardContainer').innerHTML = `
    <div class="setup-card">
      <div class="setup-header">
        <div><div class="setup-symbol">${currentSymbol} Backtest</div><div style="color:var(--text-muted);font-size:12px;font-family:var(--font-mono)">Last ${res.lookback_days} days</div></div>
        <span class="rr-badge">W:${res.wins} L:${res.losses}</span>
      </div>
      <div class="setup-levels">
        <div class="level-box"><div class="level-label">Win Rate</div><div class="level-value" style="color:${wrColor}">${res.win_rate_pct}%</div></div>
        <div class="level-box"><div class="level-label">Total Trades</div><div class="level-value lv-entry">${res.total_trades}</div></div>
        <div class="level-box"><div class="level-label">Skipped</div><div class="level-value" style="color:var(--text-muted)">${res.skipped_no_setup}</div></div>
      </div>
      <div class="confluences-grid">
        ${(res.trades||[]).slice(-5).map(t=>`
          <span class="conf-chip ${t.outcome==='WIN'?'':'missing'}">${t.outcome==='WIN'?'✓':'✗'} ${t.bias} Score:${t.score}</span>
        `).join('')}
      </div>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  buildSidebar();
  loadChart(currentSymbol);

  // Initial data load
  document.getElementById('setupCardContainer').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text-muted)">
      <div class="spinner"></div><span class="loading-text">Loading analysis...</span>
    </div>`;

  try {
    await Promise.all([
      fetchData(currentSymbol),
      fetchWatchlist(),
      fetchPerformance(),
      fetchJournal(),
    ]);
    document.getElementById('lastUpdate').textContent =
      new Date().toUTCString().substring(17, 25) + ' UTC';
  } catch(e) {
    console.error('Init error:', e);
  }
});
</script>
